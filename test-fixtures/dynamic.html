<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Content Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; color: #333; }
    h1 { color: #0969da; }
    button { background: #0969da; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin: 4px; }
    button:hover { background: #0860ca; }
    #output { border: 1px solid #d0d7de; border-radius: 8px; padding: 1rem; margin-top: 1rem; min-height: 50px; }
    .item { background: #f6f8fa; padding: 0.5rem 1rem; margin: 0.5rem 0; border-radius: 4px; border-left: 3px solid #0969da; }
  </style>
</head>
<body>
  <h1>Dynamic Content Test</h1>
  <p>Tests that the iframe auto-resizes when content is dynamically added.</p>

  <button onclick="addItem()">Add Item</button>
  <button onclick="addManyItems()">Add 10 Items</button>
  <button onclick="clearItems()">Clear</button>

  <div id="output"></div>

  <script>
    let count = 0;
    function addItem() {
      count++;
      const div = document.createElement('div');
      div.className = 'item';
      div.textContent = 'Dynamic item #' + count + ' - added at ' + new Date().toLocaleTimeString();
      document.getElementById('output').appendChild(div);
    }
    function addManyItems() {
      for (let i = 0; i < 10; i++) addItem();
    }
    function clearItems() {
      document.getElementById('output').innerHTML = '';
      count = 0;
    }
  </script>
</body>
</html>
